<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase読み込みテスト</title>
<style>
  body{font-family:sans-serif;padding:20px;line-height:1.8;font-size:15px}
  .box{border:2px solid #ddd;border-radius:8px;padding:16px;margin:10px 0}
  .ok{color:#0a7d33;font-weight:bold}
  .ng{color:#c0392b;font-weight:bold}
  .wait{color:#B45309;font-weight:bold}
  h2{font-size:17px;border-bottom:2px solid #185FA5;padding-bottom:6px}
  #log{background:#f5f5f5;padding:12px;border-radius:6px;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h2>🔍 Firebase 読み込みテスト</h2>
<p>このページは、Firebase SDKが読み込めるかだけをテストします。</p>

<div class="box">
  <div>① gstatic（Google公式）: <span id="r-gstatic" class="wait">テスト中…</span></div>
  <div>② jsDelivr: <span id="r-jsdelivr" class="wait">テスト中…</span></div>
  <div>③ unpkg: <span id="r-unpkg" class="wait">テスト中…</span></div>
</div>

<div class="box">
  <strong>診断結果:</strong>
  <div id="verdict" class="wait">テスト中です。数秒お待ちください…</div>
</div>

<div class="box">
  <strong>詳細ログ:</strong>
  <div id="log"></div>
</div>

<script>
var logEl = document.getElementById('log');
function log(msg){
  logEl.textContent += msg + "\n";
}
log("テスト開始: " + new Date().toLocaleTimeString());
log("ブラウザ: " + navigator.userAgent);
log("");

var tests = [
  { id: 'r-gstatic',  name: 'gstatic',  url: 'https://www.gstatic.com/firebasejs/8.10.1/firebase-app-compat.js' },
  { id: 'r-jsdelivr', name: 'jsDelivr', url: 'https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app-compat.js' },
  { id: 'r-unpkg',    name: 'unpkg',    url: 'https://unpkg.com/firebase@8.10.1/firebase-app-compat.js' }
];

var results = {};
var doneCount = 0;

function checkDone(){
  if (doneCount < tests.length) return;
  var anyOk = tests.some(function(t){ return results[t.name] === 'ok'; });
  var v = document.getElementById('verdict');
  if (anyOk) {
    v.className = 'ok';
    v.textContent = '✅ 少なくとも1つの配信元からSDKを読み込めました！ この場合、本体アプリも動くはずです。どの配信元が「読み込み成功」になったか確認してください。';
  } else {
    v.className = 'ng';
    v.textContent = '❌ すべての配信元でSDKを読み込めませんでした。これはネットワークやセキュリティソフトではなく、ブラウザの設定（JavaScript制限）や別の要因の可能性があります。下の詳細ログの内容を丸ごとコピーして送ってください。';
  }
}

tests.forEach(function(t){
  var s = document.createElement('script');
  s.src = t.url;
  s.onload = function(){
    results[t.name] = 'ok';
    var el = document.getElementById(t.id);
    el.className = 'ok';
    el.textContent = '✓ 読み込み成功';
    log("✓ " + t.name + " 成功: " + t.url);
    doneCount++;
    checkDone();
  };
  s.onerror = function(e){
    results[t.name] = 'ng';
    var el = document.getElementById(t.id);
    el.className = 'ng';
    el.textContent = '✗ 読み込み失敗';
    log("✗ " + t.name + " 失敗: " + t.url);
    doneCount++;
    checkDone();
  };
  document.head.appendChild(s);
});

// 10秒たっても終わらないものはタイムアウト扱い
setTimeout(function(){
  tests.forEach(function(t){
    if (!results[t.name]) {
      results[t.name] = 'timeout';
      var el = document.getElementById(t.id);
      el.className = 'ng';
      el.textContent = '✗ タイムアウト（応答なし）';
      log("✗ " + t.name + " タイムアウト");
      doneCount++;
    }
  });
  checkDone();
}, 10000);
</script>
</body>
</html>
